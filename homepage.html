<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwind & daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>GitHub Issues Tracker - Homepage</title>
    <style>
        .modal-box {
            border: none !important;
            outline: none !important;
        }
        .btn {
            border: none !important;
            outline: none !important;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <div class="navbar bg-white shadow-sm px-4 sticky top-0 z-10">
        <div class="flex-1">
            <div class="flex items-center gap-2">
                <img src="./images/github-logo.png" alt="GitHub Logo" class="w-8 h-8">
                <h2 class="text-xl font-semibold text-gray-800">GitHub Issues Tracker</h2>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <!-- Search Bar -->
            <div class="relative">
                <i id="searchIcon" class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-[#64748B] text-sm"></i>
                <input type="text" id="searchInput" placeholder="Search issues..." 
                       class="w-40 sm:w-48 md:w-64 pl-8 pr-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#4A00FF] focus:border-transparent">
            </div>
            <!-- New Issue Button -->
            <button class="inline-flex items-center justify-center px-3 py-1.5 bg-[#4A00FF] text-white rounded-lg cursor-pointer text-sm hover:bg-[#3a00cc] border-none">
                <i class="fa-solid fa-plus mr-1"></i>
                <span class="hidden sm:inline">New issue</span>
            </button>
        </div>
    </div>

    <!-- Modal -->
    <dialog id="issueModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box border-none outline-none">
            <h3 class="text-lg font-bold" id="modalTitle"></h3>
            <div class="flex items-center gap-4 mt-2 mb-4">
                <span id="modalStatus" class="text-sm font-medium"></span>
                <p class="text-sm text-gray-600">Opened by <span id="modalAuthor"></span> • <span id="modalDate"></span></p>
            </div>
            <div class="flex gap-2 mb-4 flex-wrap" id="modalLabels"></div>
            <p class="text-gray-600 mb-4" id="modalDescription"></p>
            <div class="flex justify-between items-center pt-4">
                <div>
                    <p class="text-sm text-gray-500">Assignee:</p>
                    <p class="font-bold" id="modalAssignee"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Priority:</p>
                    <div id="modalPriority"></div>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn bg-[#4A00FF] text-white hover:bg-[#3a00cc] border-none outline-none">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <main class="w-11/12 mx-auto">
        <!-- Filter Buttons -->
        <div class="shadow-sm mt-10 flex p-5 gap-5">
            <button id="allBtn" class="btn bg-[#4A00FF] text-white hover:bg-[#3a00cc] border-none">All</button>
            <button id="openBtn" class="btn border border-gray-300 hover:bg-[#4A00FF] hover:text-white hover:border-[#4A00FF]">Open</button>
            <button id="closedBtn" class="btn border border-gray-300 hover:bg-[#4A00FF] hover:text-white hover:border-[#4A00FF]">Closed</button>
        </div>
        
        <!-- Stats Card -->
        <div class="card card-body shadow-sm">
            <div class="flex justify-between items-center gap-2">
                <div class="flex gap-3 items-center">
                    <div><img src="./images/Aperture.png" alt="Aperture" class="w-10"></div>
                    <div>
                        <h2 id="totalIssuesCount" class="text-xl font-semibold">0 Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex justify-between items-center gap-5">
                    <p class="text-gray-600 text-[16px] flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500"></span>Open</p>
                    <p class="text-gray-600 text-[16px] flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-purple-500"></span>Closed</p>
                </div>
            </div>
        </div>

        <!-- Issues Grid -->
        <section>
            <div id="issuesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 grid-cols-1 mt-10 p-5 gap-6"></div>
            
            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="flex justify-center items-center my-20 hidden">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
        </section>
    </main>
    
    <script src="./homepage.js"></script>
</body>

</html>
