<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwind & daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>GitHub Issues Tracker - Homepage</title>
    <style>
        .modal-box {
            border: none !important;
            outline: none !important;
        }
        .btn, button {
            border: none !important;
            outline: none !important;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body class="bg-gray-50">

    <!-- Navbar -->
    <div class="navbar bg-white shadow-sm px-4 sticky top-0 z-10">
        <div class="flex-1">
            <div class="flex items-center gap-2">
                <img src="./images/github-logo.png" alt="GitHub Logo" class="w-8 h-8">
                <h2 class="text-xl font-semibold text-gray-800">GitHub Issues Tracker</h2>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Search issues..." 
                       class="w-40 sm:w-48 md:w-64 pl-8 pr-3 py-2.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#4A00FF] focus:border-transparent">
            </div>
            <button class="inline-flex items-center justify-center px-8 py-2.5 bg-[#4A00FF] text-white rounded-md text-sm font-medium hover:bg-[#3a00cc] border-none">
                <i class="fa-solid fa-plus mr-1"></i>
                <span class="hidden sm:inline">New issue</span>
            </button>
        </div>
    </div>

    <!-- Modal -->
    <dialog id="issueModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box p-6 border-none outline-none">
            <h3 class="text-xl font-bold text-gray-800" id="modalTitle"></h3>
            
            <div class="flex items-center gap-4 mt-3 mb-4">
                <span id="modalStatus" class="px-3 py-1 text-xs font-medium rounded-full"></span>
                <p class="text-sm text-gray-600">
                    Opened by <span id="modalAuthor"></span> • <span id="modalDate"></span>
                </p>
            </div>
            
            <div class="flex gap-2 mb-4 flex-wrap items-center" id="modalLabels"></div>
            
            <p class="text-gray-700 mb-6" id="modalDescription"></p>
            
            <div class="flex justify-between items-center border-t border-gray-200 pt-4">
                <div>
                    <p class="text-sm text-gray-500">Assignee:</p>
                    <p class="font-semibold text-gray-800" id="modalAssignee"></p>
                </div>
                <div class="text-right">
                    <p class="text-sm text-gray-500">Priority:</p>
                    <div id="modalPriority" class="mt-1"></div>
                </div>
            </div>
            
            <div class="modal-action mt-4">
                <form method="dialog">
                    <button class="btn bg-[#4A00FF] text-white hover:bg-[#3a00cc] border-none outline-none px-8 py-2.5 rounded-md">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <main class="w-11/12 max-w-7xl mx-auto py-6">

        <!-- Filter Buttons -->
        <div class="flex flex-wrap gap-3 mb-6">
            <button id="allBtn" class="tab-btn px-8 py-2.5 text-sm font-medium rounded-md bg-[#4A00FF] text-white border-none">All</button>
            <button id="openBtn" class="tab-btn px-8 py-2.5 text-sm font-medium rounded-md border border-gray-300 bg-white text-gray-600 hover:bg-[#4A00FF] hover:text-white hover:border-[#4A00FF]">Open</button>
            <button id="closedBtn" class="tab-btn px-8 py-2.5 text-sm font-medium rounded-md border border-gray-300 bg-white text-gray-600 hover:bg-[#4A00FF] hover:text-white hover:border-[#4A00FF]">Closed</button>
        </div>
        
        <!-- Stats Card -->
        <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <img src="./images/Aperture.png" alt="Aperture" class="w-10 h-10">
                    <div>
                        <h2 id="totalIssuesCount" class="text-xl font-semibold text-gray-800">0 Issues</h2>
                        <p class="text-sm text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 text-sm">
                    <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Open</span>
                    <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span> Closed</span>
                </div>
            </div>
        </div>

        <!-- Issues Grid -->
        <section>
            <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            
            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="flex justify-center items-center py-16 hidden">
                <span class="loading loading-spinner loading-xl text-[#4A00FF]"></span>
            </div>
        </section>

    </main>
    
    <script src="./homepage.js"></script>
</body>

</html>
