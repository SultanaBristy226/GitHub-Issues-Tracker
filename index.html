<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker - sign in</title>
    <!-- tailwindcss & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body class="bg-white">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white shadow-xl rounded-2xl p-8">

            <!-- Header Section -->
            <div class="text-center space-y-3 mb-8">
                <img class="mx-auto w-16 h-16" src="./images/github-logo.png" alt="GitHub Logo">
                <h1 class="text-2xl font-semibold text-gray-900">GitHub Issues Tracker</h1>
                <p class="text-gray-600">Sign in to manage your issues</p>
            </div>

            <!-- Form Section -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input id="username-input" type="text" placeholder="Enter Username" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#4A00FF] focus:border-[#4A00FF] outline-none bg-white autofill:bg-white autofill:shadow-[inset_0_0_0px_1000px_white] autofill:text-gray-900">
                    <p class="text-sm text-[#4A00FF] mt-1">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password-input" type="password" placeholder="Enter Password" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#4A00FF] focus:border-[#4A00FF] outline-none bg-white autofill:bg-white autofill:shadow-[inset_0_0_0px_1000px_white] autofill:text-gray-900">
                
                    <p class="text-sm text-[#4A00FF] mt-1">Default: admin123</p>
                </div>
            
                <button id="login-button" class="w-full bg-[#4A00FF] text-white py-2 px-4 rounded-lg hover:bg-[#3a00cc] transition duration-200 font-medium">
                    Sign In
                </button>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">OR</span>
                    </div>
                </div>

                <!-- Demo Credentials -->
                <div class="bg-gray-50 p-4 rounded-lg text-center">
                    <p class="text-sm font-medium text-gray-600 mb-2">Demo Credentials:</p>
                    <div class="flex justify-center gap-6">
                        <div class="text-left">
                            <p class="text-sm text-gray-700"><span class="font-semibold">Username:</span> admin</p>
                            <p class="text-sm text-gray-700"><span class="font-semibold">Password:</span> admin123</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- JavaScript-->
    <script src="./index.js"></script>
</body>
</html>
